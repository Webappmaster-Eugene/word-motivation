name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mobile:
    name: Mobile (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Установить зависимости
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint || true # M0: не блокируем билд на варнингах
      - name: Unit-тесты
        run: npm test -- --ci --passWithNoTests

  server:
    name: Server (typecheck + tests + prisma generate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ninegames_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-placeholder
      DEVICE_ID_SALT: ci-salt-placeholder
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ninegames_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Установить зависимости
        run: npm ci
      - name: Prisma generate
        run: npm run prisma:generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint || true
      - name: Unit-тесты
        run: npm test -- --ci --passWithNoTests
      - name: Build
        run: npm run build
