# docker-compose.yml — основной compose-файл (production / Dokploy)
#
# Локально:
#   docker-compose up -d postgres redis       # только инфра; server/web запускаются вручную
#   docker-compose --profile app up -d        # вся связка
#   # docker-compose.override.yml при локальном запуске добавит host-порты
#   # 5433 (postgres) и 6380 (redis) для прямого доступа с хоста (Prisma Studio и т.п.).
#
# Dokploy:
#   Dokploy вызывает `docker compose -f ./docker-compose.yml up -d --build`.
#   Флаг -f явный, поэтому docker-compose.override.yml НЕ мержится — prod не получает
#   host-портов для БД/Redis (они общаются по внутренней сети compose).
#
#   В Dokploy UI → Environment Variables нужно выставить минимум:
#     COMPOSE_PROFILES=app         # иначе server/web (под profiles:[app]) не поднимутся
#     JWT_SECRET=<64 байта random>
#     DEVICE_ID_SALT=<random>
#     EXPO_PUBLIC_API_BASE_URL=https://<api-домен>
#     ALLOWED_ORIGINS=https://<web-домен>
#     OPENROUTER_API_KEY=<ключ>    # после M8
#
#   Роутинг/SSL — через Dokploy UI (Traefik labels можно добавить через Dokploy,
#   либо раскомментировать секции labels ниже).

services:
  postgres:
    image: postgres:16-alpine
    container_name: babyfunner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-90games}
      PGDATA: /var/lib/postgresql/data/pgdata
    # Host-порт пробрасывает только docker-compose.override.yml (локальный dev).
    # В prod доступ только по внутренней сети: postgres:5432 из server-контейнера.
    volumes:
      - ninegames-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-90games}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ninegames

  redis:
    image: redis:7-alpine
    container_name: babyfunner-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
    # Host-порт пробрасывает только docker-compose.override.yml (локальный dev).
    # В prod доступ только по внутренней сети: redis:6379 из server-контейнера.
    volumes:
      - ninegames-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ninegames

  tts-worker:
    build:
      context: tts-worker
      dockerfile: Dockerfile
    image: babyfunner-tts-worker:${IMAGE_TAG:-latest}
    container_name: babyfunner-tts-worker
    restart: unless-stopped
    profiles: ["app"]
    environment:
      TTS_LOG_LEVEL: ${TTS_LOG_LEVEL:-INFO}
      TTS_TORCH_THREADS: ${TTS_TORCH_THREADS:-4}
    volumes:
      # Persistent том: скачанная модель Silero сохраняется между рестартами.
      # Первый старт скачивает ~60 МБ с models.silero.ai; на Dokploy volume
      # переживёт rebuild server-контейнера.
      - ninegames-tts-models:/models
    # Внутренний сервис — наружу НЕ выставляем, только docker-network.
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Первый старт качает и распаковывает ~60 МБ модели и прогревает
      # torch — порядок 20–40 сек. Даём с запасом.
      start_period: 90s
    networks:
      - ninegames

  server:
    build:
      context: server
      dockerfile: Dockerfile
    image: babyfunner-server:${IMAGE_TAG:-latest}
    container_name: babyfunner-server
    restart: unless-stopped
    profiles: ["app"]
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-90games}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-2592000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-haiku-4-5}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      RATE_LIMIT_CHAT_PER_MIN: ${RATE_LIMIT_CHAT_PER_MIN:-30}
      RATE_LIMIT_CHAT_IP_PER_MIN: ${RATE_LIMIT_CHAT_IP_PER_MIN:-120}
      DEVICE_ID_SALT: ${DEVICE_ID_SALT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TTS_ENABLED: ${TTS_ENABLED:-true}
      TTS_WORKER_URL: ${TTS_WORKER_URL:-http://tts-worker:5000}
      TTS_CACHE_DIR: /data/tts-cache
      TTS_MAX_CACHE_MB: ${TTS_MAX_CACHE_MB:-512}
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-xenia}
      TTS_REQUEST_TIMEOUT_MS: ${TTS_REQUEST_TIMEOUT_MS:-15000}
      TTS_RATE_LIMIT_PER_MIN: ${TTS_RATE_LIMIT_PER_MIN:-60}
    volumes:
      # Persistent кеш синтезированных WAV. Живёт до ручного сброса или эвикции
      # по размеру (TTS_MAX_CACHE_MB). На Dokploy — обычный docker volume,
      # не требует настроек.
      - ninegames-tts-cache:/data/tts-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # tts-worker специально без `service_healthy` — если он упал (OOM, нет
      # сети для скачивания модели), сервер всё равно должен стартовать и
      # отдавать 503 из `/tts/*`, на что мобильный клиент автоматически упадёт
      # на expo-speech. Иначе отказ sidecar'а парализует всё приложение.
      tts-worker:
        condition: service_started
    # Host-порт пробрасывает только docker-compose.override.yml (локальный dev).
    # В prod доступ — через Dokploy Traefik (Domains в UI приложения),
    # Traefik ходит внутри compose-сети по имени `server:3000`.
    expose:
      - "3000"
    healthcheck:
      # Используем node вместо wget: wget в alpine-runtime может отсутствовать/урезан
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{process.exit(JSON.parse(d).status==='ok'?0:1)}catch{process.exit(1)}})}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ninegames
    # Dokploy: Traefik автоматически настраивается через UI.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.babyfunner-api.rule=Host(`api.example.com`)
    #   - traefik.http.services.babyfunner-api.loadbalancer.server.port=3000

  web:
    build:
      context: mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:3000}
    image: babyfunner-web:${IMAGE_TAG:-latest}
    container_name: babyfunner-web
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      server:
        condition: service_healthy
    # Host-порт пробрасывает только docker-compose.override.yml (локальный dev).
    # В prod доступ — через Dokploy Traefik (Domains в UI приложения).
    expose:
      - "80"
    healthcheck:
      # wget в nginx:alpine присутствует — этот healthcheck безопасен
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - ninegames
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.babyfunner-web.rule=Host(`app.example.com`)
    #   - traefik.http.services.babyfunner-web.loadbalancer.server.port=80

volumes:
  ninegames-postgres-data:
  ninegames-redis-data:
  ninegames-tts-models:
  ninegames-tts-cache:

networks:
  ninegames:
    driver: bridge
